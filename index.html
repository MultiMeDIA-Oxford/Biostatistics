<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Biostatistics</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background-color: white;
      font-family: "Times New Roman", Times, serif;
    }

    /* Top bar */
    .header {
      position: relative;
      width: 100%;
      padding-top: 20px;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 20px;
      left: 30px;
      width: 80px;
      height: auto;
    }

    /* Main title */
    .title {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      margin-top: 60px;
      color: black;
    }

  </style>
</head>

<body>

  <!-- Logo -->
  <div class="header">
    <img src="image/logo.png" alt="Logo" class="logo">

    <!-- Title -->
    <h1 class="title">Biostatistics</h1>
  </div>

</body>
</html>
